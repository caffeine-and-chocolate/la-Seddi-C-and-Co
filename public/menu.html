<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>

    </ul>

  <main>
    <h1>Our Menu</h1>
    <div id="menuContainer" class="menu-container"></div>
  </main>

  <footer>
    <!-- Reuse footer -->
  </footer>

  <script>
    async function loadMenu() {
      const response = await fetch('/api/menu');
      const menuItems = await response.json();
      const container = document.getElementById('menuContainer');

      // Group items by category
      const categories = {};
      menuItems.forEach(item => {
        const categoryName = (item.category || 'Uncategorized').trim();
        if (!categories[categoryName]) categories[categoryName] = [];
        categories[categoryName].push(item);
      });

      container.innerHTML = '';

      const categoryOrder = [
        "Starters","Salads","Vegan","Vegetarian","Burgers","Poultry",
        "Seafood","Grills","Combos","Sides","Extras","Desserts",
        "Hot Beverages","Alcoholic Beverages"
      ];

      function renderCategory(category, items) {
        const div = document.createElement('div');
        div.classList.add('menu-category');
        div.innerHTML = `<h2>${category}</h2>`;
        items.sort((a, b) => a.itemName.localeCompare(b.itemName));
        items.forEach(item => {
          const itemEl = document.createElement('div');
          itemEl.classList.add('menu-item');

          const titleRow = document.createElement('div');
          titleRow.classList.add('menu-item-title');
          const nameEl = document.createElement('span');
          nameEl.classList.add('menu-item-name');
          nameEl.textContent = item.itemName;
          const priceEl = document.createElement('span');
          priceEl.classList.add('menu-item-price');
          priceEl.textContent = `R${Number(item.price).toFixed(2)}`;
          titleRow.appendChild(nameEl);
          titleRow.appendChild(priceEl);

          itemEl.appendChild(titleRow);

          // Description (only if present)
          if (item.description && item.description.trim() !== '') {
            const descEl = document.createElement('div');
            descEl.classList.add('menu-item-desc');
            descEl.textContent = item.description;
            itemEl.appendChild(descEl);
          }

          div.appendChild(itemEl);
        });
        return div;
      }

      // Render categories in custom order
      categoryOrder.forEach(category => {
        if (categories[category]) {
          container.appendChild(renderCategory(category, categories[category]));
          delete categories[category];
        }
      });

      // Render remaining categories
      Object.keys(categories).sort().forEach(category => {
        container.appendChild(renderCategory(category, categories[category]));
      });
    }

    // Load menu when page opens
    loadMenu();
  </script>
