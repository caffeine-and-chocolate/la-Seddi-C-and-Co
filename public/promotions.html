  <main>
  <h1>Current Promotions</h1>
  <div id="promotionsContainer"></div>
</main>

<script>
async function loadPromotions() {
  const response = await fetch('/api/promotions');
  const promotions = await response.json();
  const container = document.getElementById('promotionsContainer');

  container.innerHTML = ''; // clear old content

  promotions.forEach(promo => {
    const section = document.createElement('section');
    section.innerHTML = `
      <h2>${promo.title}</h2>
      <p>${promo.description}</p>
      <p><strong>Valid:</strong> ${new Date(promo.startDate).toLocaleDateString()} 
      to ${new Date(promo.endDate).toLocaleDateString()}</p>
      <p><strong>Branch:</strong> ${promo.branch}</p>
    `;
    container.appendChild(section);
  });
}

// Load promotions when page opens
loadPromotions();
</script>
